services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campus_connect}
      POSTGRES_USER: ${POSTGRES_USER:-campus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campus_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campus_user} -d ${POSTGRES_DB:-campus_connect}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus-backend
    restart: unless-stopped
    environment:
      APP_PORT: 8080
      APP_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-campus_user}:${POSTGRES_PASSWORD:-campus_pass}@postgres:5432/${POSTGRES_DB:-campus_connect}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: campus-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - node-exporter

  grafana:
    image: grafana/grafana:11.1.0
    container_name: campus-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  node-exporter:
      image: prom/node-exporter:latest
      container_name: campus-node-exporter
      restart: unless-stopped
      ports:
        - "9100:9100"

volumes:
  postgres_data:
  grafana_data:
